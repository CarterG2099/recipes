services:
  - type: web
    name: recipes
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FASTAPI_SECRET_KEY
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: IS_PRODUCTION
        value: "true"
    healthCheckPath: /health
