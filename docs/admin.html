<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self' blob: https://cdn.jsdelivr.net; object-src 'none'; base-uri 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editors — Mom's Kitchen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5E9C76">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0/dist/umd/supabase.js" integrity="sha384-CQbEv3UOeYwlaBLdPF5KqEagCP39Q1KpvJC6Gwa3UGjZAwMvpA+0TFxSSnrgb4MX" crossorigin="anonymous"></script>
</head>
<body data-page="admin">

  <header class="app-header" x-data>
    <a href="/" class="app-logo"><span class="logo-mark">🥗</span> Mom's Kitchen</a>
    <div class="header-actions">
      <a href="/" class="btn btn-ghost btn-sm">← All recipes</a>
      <button class="btn btn-ghost btn-sm" @click="$store.auth.logout()">Sign out</button>
    </div>
  </header>

  <main class="page-content" x-data="adminPage()" x-init="init()">
    <div class="edit-form">
      <h1 style="margin-bottom:var(--space-2);">Who can edit</h1>
      <p class="text-muted" style="margin-bottom:var(--space-6);">
        Add a Google email to let that person sign in and edit recipes. Admins can also manage this list.
      </p>

      <div x-show="error" class="auth-notice auth-notice--error" x-text="error"></div>

      <!-- Add -->
      <div class="card form-section" style="padding:var(--space-4);">
        <div class="import-row" style="display:flex; gap:var(--space-2); flex-wrap:wrap; align-items:center;">
          <input class="input" type="email" placeholder="name@gmail.com" x-model="newEmail" style="flex:1 1 220px;"
            @keydown.enter="addEmail()">
          <label style="display:flex; align-items:center; gap:6px; font-size:var(--text-sm); white-space:nowrap;">
            <input type="checkbox" x-model="newIsAdmin"> Admin
          </label>
          <button class="btn btn-primary btn-sm" @click="addEmail()" :disabled="busy">Add</button>
        </div>
      </div>

      <!-- List -->
      <div x-show="loading" style="display:flex; justify-content:center; padding:2rem;"><div class="spinner"></div></div>
      <table x-show="!loading">
        <thead><tr><th>Email</th><th>Role</th><th></th></tr></thead>
        <tbody>
          <template x-for="row in people" :key="row.email">
            <tr>
              <td x-text="row.email"></td>
              <td>
                <span class="badge" x-show="row.is_admin">Admin</span>
                <span class="text-muted" x-show="!row.is_admin">Editor</span>
              </td>
              <td style="text-align:right; white-space:nowrap;">
                <button class="btn btn-ghost btn-sm" x-show="!row.is_admin" @click="setAdmin(row, true)" :disabled="busy">Make admin</button>
                <button class="btn btn-ghost btn-sm" x-show="row.is_admin && row.email !== myEmail" @click="setAdmin(row, false)" :disabled="busy">Remove admin</button>
                <button class="btn btn-danger btn-sm" x-show="row.email !== myEmail" @click="removeEmail(row)" :disabled="busy">Remove</button>
                <span class="text-muted" x-show="row.email === myEmail" style="font-size:var(--text-sm);">(you)</span>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </main>

  <div class="toast" x-data x-cloak x-show="$store.ui.toast" x-transition>
    <span class="toast-msg" x-text="$store.ui.toast?.msg"></span>
    <button class="toast-close" @click="$store.ui.dismissToast()">✕</button>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
