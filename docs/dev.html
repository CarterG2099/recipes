<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self' blob: https://cdn.jsdelivr.net; object-src 'none'; base-uri 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Mom's Kitchen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0/dist/umd/supabase.js" integrity="sha384-CQbEv3UOeYwlaBLdPF5KqEagCP39Q1KpvJC6Gwa3UGjZAwMvpA+0TFxSSnrgb4MX" crossorigin="anonymous"></script>
</head>
<body data-page="dev">

  <header class="app-header" x-data>
    <a href="/" class="app-logo"><span class="logo-mark">🥗</span> Mom's Kitchen</a>
    <div class="header-actions">
      <a href="/" class="btn btn-ghost btn-sm">← All recipes</a>
    </div>
  </header>

  <main class="page-content" x-data="devPage()" x-init="init()">
    <div class="dev-banner">
      🧪 <strong>Preview</strong> — testing measurement conversion &amp; scaling. This is an experiment; the
      real recipe page is unchanged. Conversions are best-effort from the recipe's text.
    </div>

    <div x-show="loading" style="display:flex; justify-content:center; padding:4rem;"><div class="spinner"></div></div>
    <div x-show="!loading && error" class="empty-state" x-text="error"></div>

    <article class="recipe-detail" x-show="!loading && recipe" x-cloak>
      <h1 x-text="recipe?.title"></h1>

      <div class="recipe-meta">
        <span x-show="recipe?.prep_time_minutes" x-text="`Prep ${recipe?.prep_time_minutes} min`"></span>
        <span x-show="recipe?.cook_time_minutes" x-text="`Cook ${recipe?.cook_time_minutes} min`"></span>
        <span x-show="recipe?.servings" x-text="`Serves ${scaledServings}`"></span>
      </div>

      <!-- Controls -->
      <div class="dev-controls">
        <div class="scale-control">
          <span class="scale-label-text">Batch</span>
          <button class="btn btn-ghost btn-icon" @click="decScale()" :disabled="scale <= 0.5">−</button>
          <span class="scale-value" x-text="scaleLabel"></span>
          <button class="btn btn-ghost btn-icon" @click="incScale()">+</button>
        </div>
        <div class="unit-toggle">
          <button class="btn btn-sm" :class="system === 'us' ? 'btn-primary' : 'btn-ghost'" @click="system = 'us'">US</button>
          <button class="btn btn-sm" :class="system === 'metric' ? 'btn-primary' : 'btn-ghost'" @click="system = 'metric'">Metric</button>
        </div>
      </div>

      <div class="recipe-columns">
        <section>
          <h2 class="recipe-section-title">Ingredients</h2>
          <ul class="ingredient-list">
            <template x-for="(ing, i) in converted" :key="i"><li x-text="ing"></li></template>
          </ul>
        </section>
        <section>
          <h2 class="recipe-section-title">Instructions</h2>
          <ol class="instruction-list">
            <template x-for="(step, i) in convertedSteps" :key="i"><li x-text="step"></li></template>
          </ol>
        </section>
      </div>
    </article>
  </main>

  <div class="toast" x-data x-cloak x-show="$store.ui.toast" x-transition>
    <span class="toast-msg" x-text="$store.ui.toast?.msg"></span>
    <button class="toast-close" @click="$store.ui.dismissToast()">✕</button>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
