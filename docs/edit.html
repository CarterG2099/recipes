<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self' blob: https://cdn.jsdelivr.net; object-src 'none'; base-uri 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit recipe — Mom's Kitchen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5E9C76">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mom's Kitchen">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0/dist/umd/supabase.js" integrity="sha384-CQbEv3UOeYwlaBLdPF5KqEagCP39Q1KpvJC6Gwa3UGjZAwMvpA+0TFxSSnrgb4MX" crossorigin="anonymous"></script>
</head>
<body data-page="edit">

  <header class="app-header" x-data>
    <a href="/" class="app-logo"><span class="logo-mark">🥗</span> Mom's Kitchen</a>
    <div class="header-actions">
      <a href="/admin.html" class="btn btn-ghost btn-sm" x-cloak x-show="$store.auth.isAdmin">Admin</a>
      <button class="btn btn-ghost btn-sm" @click="$store.auth.logout()">Sign out</button>
    </div>
  </header>

  <main class="page-content" x-data="editPage()" x-init="init()">
    <div class="edit-form">
      <h1 x-text="id ? 'Edit recipe' : 'New recipe'" style="margin-bottom:var(--space-6);"></h1>

      <!-- Import options (new recipes) -->
      <div class="form-section" x-show="!id">
        <h2 class="recipe-section-title">Start from…</h2>
        <div class="import-options">
          <div class="import-tile">
            <span class="tile-title">🔗 A link</span>
            <input class="input" type="url" placeholder="Paste a recipe URL" x-model="importUrlValue">
            <button class="btn btn-ghost btn-sm" @click="importUrl()" :disabled="importing">Import</button>
          </div>
          <div class="import-tile">
            <span class="tile-title">📄 A PDF</span>
            <span class="tile-hint">Any recipe PDF — even a scanned one.</span>
            <input type="file" accept="application/pdf" x-ref="pdf" @change="importPdf($event)" :disabled="importing">
          </div>
          <div class="import-tile">
            <span class="tile-title">📷 A photo</span>
            <span class="tile-hint">A handwritten card or printout — it reads it and keeps the photo.</span>
            <input type="file" accept="image/*" x-ref="photo" @change="importPhoto($event)" :disabled="importing">
          </div>
        </div>
        <div class="busy-note" x-show="importing"><span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Reading…</div>
        <div class="import-warning" x-show="importWarning" x-text="importWarning"></div>
      </div>

      <div x-show="error" class="auth-notice auth-notice--error" x-text="error"></div>

      <!-- Basics -->
      <div class="form-section">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input class="input" type="text" x-model="form.title" placeholder="e.g. Grandma's Banana Bread">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="input" rows="2" x-model="form.description"></textarea>
        </div>
        <div class="field-grid">
          <div class="form-group"><label class="form-label">Prep (min)</label><input class="input" type="number" min="0" x-model.number="form.prep_time_minutes"></div>
          <div class="form-group"><label class="form-label">Cook (min)</label><input class="input" type="number" min="0" x-model.number="form.cook_time_minutes"></div>
          <div class="form-group"><label class="form-label">Servings</label><input class="input" type="text" x-model="form.servings" placeholder="e.g. 4"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Tags (comma-separated)</label>
          <input class="input" type="text" x-model="form.tagsText" placeholder="dinner, baking, family">
        </div>
      </div>

      <!-- Photo of the card -->
      <div class="form-section">
        <h2 class="recipe-section-title">Recipe photo</h2>
        <div class="image-preview">
          <img x-show="form.image_url" :src="form.image_url" alt="Recipe photo">
          <div>
            <input type="file" accept="image/*" x-ref="attach" @change="attachPhoto($event)" :disabled="importing">
            <div><button class="btn btn-ghost btn-sm" x-show="form.image_url" @click="form.image_url = null" style="margin-top:8px;">Remove photo</button></div>
          </div>
        </div>
      </div>

      <!-- Ingredients (structured: amount · unit · item) -->
      <div class="form-section">
        <h2 class="recipe-section-title">Ingredients</h2>
        <template x-for="(ing, i) in form.ingredients" :key="i">
          <div class="ing-row">
            <input class="input ing-qty" type="text" x-model="ing.qty" placeholder="1" aria-label="Amount">
            <select class="select ing-unit" x-model="ing.unit" aria-label="Unit">
              <template x-for="opt in unitOptions" :key="opt.value">
                <option :value="opt.value" x-text="opt.label"></option>
              </template>
            </select>
            <input class="input ing-item" type="text" x-model="ing.item" placeholder="flour" aria-label="Ingredient">
            <button class="btn btn-ghost btn-icon" @click="form.ingredients.splice(i, 1)" title="Remove">✕</button>
          </div>
        </template>
        <button class="btn btn-ghost btn-sm" @click="form.ingredients.push({ qty: '', unit: '', item: '' })">+ Add ingredient</button>
      </div>

      <!-- Instructions -->
      <div class="form-section">
        <h2 class="recipe-section-title">Instructions</h2>
        <template x-for="(step, i) in form.instructions" :key="i">
          <div class="line-row">
            <span class="text-muted" style="padding-top:.5rem; min-width:1.5rem;" x-text="(i + 1) + '.'"></span>
            <textarea class="input" rows="2" x-model="form.instructions[i]"></textarea>
            <button class="btn btn-ghost btn-icon" @click="form.instructions.splice(i, 1)" title="Remove">✕</button>
          </div>
        </template>
        <button class="btn btn-ghost btn-sm" @click="form.instructions.push('')">+ Add step</button>
      </div>

      <div class="form-section">
        <div class="form-group">
          <label class="form-label">Source URL (optional)</label>
          <input class="input" type="url" x-model="form.source_url">
        </div>
      </div>

      <div class="header-actions" style="justify-content:flex-end;">
        <a class="btn btn-ghost" href="/">Cancel</a>
        <button class="btn btn-primary" @click="save()" :disabled="saving || importing">
          <span x-text="saving ? 'Saving…' : 'Save recipe'"></span>
        </button>
      </div>
    </div>
  </main>

  <div class="toast" x-data x-cloak x-show="$store.ui.toast" x-transition>
    <span class="toast-msg" x-text="$store.ui.toast?.msg"></span>
    <button class="toast-close" @click="$store.ui.dismissToast()">✕</button>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
