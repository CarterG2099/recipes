<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self' blob: https://cdn.jsdelivr.net; object-src 'none'; base-uri 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mom's Kitchen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0/dist/umd/supabase.js" integrity="sha384-CQbEv3UOeYwlaBLdPF5KqEagCP39Q1KpvJC6Gwa3UGjZAwMvpA+0TFxSSnrgb4MX" crossorigin="anonymous"></script>
</head>
<body data-page="browse">

  <header class="app-header" x-data>
    <a href="/" class="app-logo"><span class="logo-mark">🥗</span> Mom's Kitchen</a>
    <div class="header-actions">
      <a href="/edit.html" class="btn btn-primary btn-sm" x-cloak x-show="$store.auth.isEditor">+ Add recipe</a>
      <button class="btn btn-ghost btn-sm" x-cloak x-show="$store.auth.isEditor" @click="$store.auth.logout()">Sign out</button>
      <button class="btn btn-ghost btn-sm" x-cloak x-show="$store.auth.ready && !$store.auth.isLoggedIn" @click="$store.auth.signIn()">Sign in</button>
    </div>
  </header>

  <main class="page-content" x-data="browsePage()" x-init="init()">
    <div class="browse-search">
      <input class="input" type="search" placeholder="Search recipes, ingredients…" x-model="search">
    </div>

    <div class="tag-filter-row" x-show="tags.length" x-cloak>
      <button class="tag-chip" :class="{ active: activeTag === null }" @click="activeTag = null">All</button>
      <template x-for="tag in tags" :key="tag">
        <button class="tag-chip" :class="{ active: activeTag === tag }"
          @click="activeTag = (activeTag === tag ? null : tag)" x-text="tag"></button>
      </template>
    </div>

    <div x-show="loading" style="display:flex; justify-content:center; padding:4rem;"><div class="spinner"></div></div>

    <div x-show="!loading && error" class="empty-state" x-text="error"></div>

    <div x-show="!loading && !error && filtered.length === 0" class="empty-state">
      <div class="icon">🍽️</div>
      <p>No recipes yet.</p>
    </div>

    <div class="recipe-list" x-show="!loading && !error && filtered.length" x-cloak>
      <template x-for="(r, i) in filtered" :key="r.id">
        <a class="recipe-row" :href="`/recipe.html?id=${r.id}`">
          <span class="rnum" x-text="String(i + 1).padStart(2, '0')"></span>
          <div class="row-main">
            <h3 class="row-title" x-text="r.title"></h3>
            <div class="row-tags" x-show="r.tags && r.tags.length">
              <template x-for="tag in r.tags" :key="tag"><span class="ct" x-text="tag"></span></template>
            </div>
          </div>
          <span class="row-meta" x-text="metaLine(r)"></span>
        </a>
      </template>
    </div>
  </main>

  <div class="toast" x-data x-cloak x-show="$store.ui.toast" x-transition>
    <span class="toast-msg" x-text="$store.ui.toast?.msg"></span>
    <button class="toast-close" @click="$store.ui.dismissToast()">✕</button>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
