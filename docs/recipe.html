<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self' blob: https://cdn.jsdelivr.net; object-src 'none'; base-uri 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe — Mom's Kitchen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5E9C76">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mom's Kitchen">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0/dist/umd/supabase.js" integrity="sha384-CQbEv3UOeYwlaBLdPF5KqEagCP39Q1KpvJC6Gwa3UGjZAwMvpA+0TFxSSnrgb4MX" crossorigin="anonymous"></script>
</head>
<body data-page="recipe">

  <header class="app-header" x-data>
    <a href="/" class="app-logo"><span class="logo-mark">🥗</span> Mom's Kitchen</a>
    <div class="header-actions">
      <a href="/edit.html" class="btn btn-primary btn-sm" x-cloak x-show="$store.auth.isEditor">+ Add recipe</a>
      <a href="/admin.html" class="btn btn-ghost btn-sm" x-cloak x-show="$store.auth.isAdmin">Admin</a>
      <button class="btn btn-ghost btn-sm" x-cloak x-show="$store.auth.isEditor" @click="$store.auth.logout()">Sign out</button>
      <button class="btn btn-ghost btn-sm" x-cloak x-show="$store.auth.ready && !$store.auth.isLoggedIn" @click="$store.auth.signIn()">Sign in</button>
    </div>
  </header>

  <main class="page-content" x-data="recipePage()" x-init="init()">
    <a class="btn btn-ghost btn-sm" href="/" style="margin-bottom:var(--space-6);">← All recipes</a>

    <div x-show="loading" style="display:flex; justify-content:center; padding:4rem;"><div class="spinner"></div></div>
    <div x-show="!loading && error" class="empty-state" x-text="error"></div>

    <article class="recipe-detail" x-show="!loading && recipe" x-cloak>
      <div style="display:flex; justify-content:space-between; gap:var(--space-4); align-items:flex-start; flex-wrap:wrap;">
        <h1 x-text="recipe?.title"></h1>
        <div class="header-actions" style="flex:0 0 auto;">
          <button class="btn btn-ghost btn-sm" x-cloak x-show="$store.auth.isEditor" @click="toggleFavorite()"
            x-text="recipe?.is_favorite ? '⭐ Favorited' : '☆ Favorite'"></button>
          <button class="btn btn-ghost btn-sm" @click="share()">↗ Share</button>
          <a class="btn btn-ghost btn-sm" x-cloak x-show="canEdit" :href="`/edit.html?id=${recipe?.id}`">Edit</a>
          <button class="btn btn-danger btn-sm" x-cloak x-show="canEdit" @click="del()">Delete</button>
        </div>
      </div>

      <div class="recipe-meta">
        <span x-show="recipe?.prep_time_minutes" x-text="`Prep ${recipe?.prep_time_minutes} min`"></span>
        <span x-show="recipe?.cook_time_minutes" x-text="`Cook ${recipe?.cook_time_minutes} min`"></span>
        <span x-show="totalTime" x-text="`Total ${totalTime} min`"></span>
        <span x-show="recipe?.servings" x-text="`Serves ${scaledServings}`"></span>
      </div>

      <p class="text-muted" x-show="recipe?.description" x-text="recipe?.description" style="line-height:1.55; margin-top:0;"></p>

      <div class="cardtags" style="margin-bottom:var(--space-6);">
        <template x-for="tag in (recipe?.tags || [])" :key="tag"><span class="badge" x-text="tag"></span></template>
      </div>

      <div class="recipe-notes" x-show="recipe?.notes" x-cloak>
        <span class="notes-label">Notes</span>
        <p x-text="recipe?.notes"></p>
      </div>

      <div class="cook-actions">
        <button class="btn btn-primary btn-sm" x-show="(recipe?.instructions || []).length" @click="enterCook()">👩‍🍳 Cook mode</button>
        <button class="btn btn-sm" x-show="wakeSupported" :class="keepAwake ? 'btn-primary' : 'btn-ghost'"
          @click="toggleWake()" x-text="keepAwake ? '🔆 Screen staying on' : '🔅 Keep screen on'"></button>
      </div>

      <div class="recipe-columns">
        <section>
          <h2 class="recipe-section-title">Ingredients</h2>
          <div class="ingredient-controls">
            <div class="scale-control">
              <span class="scale-label-text">Batch</span>
              <button class="btn btn-ghost btn-icon" @click="decScale()" :disabled="scale <= 0.5" aria-label="Less">−</button>
              <span class="scale-value" x-text="scaleLabel"></span>
              <button class="btn btn-ghost btn-icon" @click="incScale()" aria-label="More">+</button>
            </div>
            <div class="unit-toggle">
              <button class="btn btn-sm" :class="system === 'us' ? 'btn-primary' : 'btn-ghost'" @click="system = 'us'">US</button>
              <button class="btn btn-sm" :class="system === 'metric' ? 'btn-primary' : 'btn-ghost'" @click="system = 'metric'">Metric</button>
            </div>
          </div>
          <ul class="ingredient-list checkable">
            <template x-for="(ing, i) in converted" :key="i">
              <li :class="{ checked: checkedIng[i] }" @click="toggleIng(i)" x-text="ing"></li>
            </template>
          </ul>
        </section>
        <section>
          <h2 class="recipe-section-title">Instructions</h2>
          <ol class="instruction-list checkable">
            <template x-for="(segs, i) in stepSegments" :key="i">
              <li :class="{ checked: checkedStep[i] }">
                <template x-for="(seg, j) in segs" :key="j"><span><span x-show="seg.text" @click="toggleStep(i)" x-text="seg.text"></span><button x-show="seg.timer" class="timer-chip" @click.stop="startTimer(seg.timer, seg.label)" x-text="'⏱ ' + seg.label"></button><span x-show="seg.temp" class="temp-chip" @click="toggleStep(i)" x-text="seg.temp"></span></span></template>
              </li>
            </template>
          </ol>
        </section>
      </div>

      <p x-show="recipe?.source_url" style="margin-top:var(--space-8);">
        <a class="text-muted" :href="recipe?.source_url" target="_blank" rel="noopener noreferrer">Source ↗</a>
      </p>

      <!-- Photo last so a late load never shifts the recipe content above it. -->
      <img class="recipe-photo" x-show="recipe?.image_url" :src="recipe?.image_url" alt="Recipe photo" loading="lazy" style="margin-top:var(--space-8);">
    </article>

    <!-- Cook mode: one big step at a time -->
    <div class="cook-overlay" x-show="cookMode" x-cloak @keydown.escape.window="exitCook()">
      <div class="cook-top">
        <span x-text="`Step ${cookStep + 1} of ${convertedSteps.length}`"></span>
        <button class="btn btn-ghost btn-sm" @click="exitCook()">✕ Done</button>
      </div>
      <div class="cook-step">
        <template x-for="(seg, j) in (stepSegments[cookStep] || [])" :key="j"><span><span x-show="seg.text" x-text="seg.text"></span><button x-show="seg.timer" class="timer-chip lg" @click="startTimer(seg.timer, seg.label)" x-text="'⏱ ' + seg.label"></button><span x-show="seg.temp" class="temp-chip lg" x-text="seg.temp"></span></span></template>
      </div>
      <div class="cook-nav">
        <button class="btn btn-ghost" @click="cookPrev()" :disabled="cookStep === 0">← Prev</button>
        <button class="btn btn-ghost" @click="cookIngOpen = !cookIngOpen">🧺 Ingredients</button>
        <button class="btn btn-primary" @click="cookNext()" :disabled="cookStep >= convertedSteps.length - 1">Next →</button>
      </div>

      <!-- Ingredients bottom sheet -->
      <div class="cook-sheet-backdrop" x-show="cookIngOpen" @click="cookIngOpen = false" x-transition.opacity></div>
      <div class="cook-sheet" :class="{ open: cookIngOpen }">
        <div class="cook-sheet-head">
          <strong>Ingredients</strong>
          <button class="btn btn-ghost btn-sm" @click="cookIngOpen = false">✕</button>
        </div>
        <ul class="checkable">
          <template x-for="(ing, i) in converted" :key="i">
            <li :class="{ checked: checkedIng[i] }" @click="toggleIng(i)" x-text="ing"></li>
          </template>
        </ul>
      </div>
    </div>

    <!-- Delete confirmation -->
    <div class="modal-overlay" x-show="confirmDelete" x-cloak x-transition.opacity
         @keydown.escape.window="confirmDelete = false" @click.self="confirmDelete = false">
      <div class="modal" style="max-width:420px;">
        <div class="modal-header"><h2 class="modal-title">Delete recipe?</h2></div>
        <p style="margin:0 0 var(--space-2); line-height:1.5;">
          Delete “<strong x-text="recipe?.title"></strong>”? This can’t be undone.
        </p>
        <div class="modal-footer">
          <button class="btn btn-ghost" @click="confirmDelete = false">Cancel</button>
          <button class="btn btn-danger" @click="doDelete()">Delete</button>
        </div>
      </div>
    </div>

    <!-- Active timers (fixed at the bottom) -->
    <div class="timer-bar" x-show="timers.length" x-cloak>
      <template x-for="t in timers" :key="t.id">
        <div class="timer-pill">
          <span class="timer-label" x-text="t.label"></span>
          <strong x-text="clock(t.remaining)"></strong>
          <button class="timer-add" @click="bumpTimer(t.id)">+1 min</button>
          <button class="timer-stop" @click="stopTimer(t.id)" aria-label="Stop timer">✕</button>
        </div>
      </template>
    </div>
  </main>

  <div class="toast" x-data x-cloak x-show="$store.ui.toast" x-transition>
    <span class="toast-msg" x-text="$store.ui.toast?.msg"></span>
    <button class="toast-close" @click="$store.ui.dismissToast()">✕</button>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
